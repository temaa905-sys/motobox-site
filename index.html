<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Mini Telegram</title>
<script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>

<style>

body{
font-family:Arial;
background:#0b1220;
color:white;
margin:0;
}

#auth,#chat{
max-width:600px;
margin:auto;
padding:20px;
}

input{
width:100%;
padding:10px;
margin:5px 0;
}

button{
padding:10px;
background:#4c7dff;
color:white;
border:none;
cursor:pointer;
}

#messages{
height:300px;
overflow:auto;
border:1px solid #333;
padding:10px;
margin:10px 0;
}

.user{
cursor:pointer;
padding:5px;
border-bottom:1px solid #333;
}

</style>
</head>

<body>

<div id="auth">

<h2>Регистрация</h2>

<input id="ruser" placeholder="username">
<input id="rpass" placeholder="password">
<button onclick="register()">register</button>

<h2>Вход</h2>

<input id="luser">
<input id="lpass">
<button onclick="login()">login</button>

</div>

<div id="chat" style="display:none">

<h2>Пользователи</h2>
<div id="users"></div>

<h2>Чат</h2>

<div id="messages"></div>

<input id="msg">
<button onclick="send()">send</button>

</div>

<script>

let socket=io()
let currentUser=null

async function register(){

let username=ruser.value
let password=rpass.value

let r=await fetch("/register",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({username,password})
})

let data=await r.json()

alert(JSON.stringify(data))
}

async function login(){

let username=luser.value
let password=lpass.value

let r=await fetch("/login",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({username,password})
})

let data=await r.json()

if(data.error) return alert(data.error)

currentUser=data

auth.style.display="none"
chat.style.display="block"

loadUsers()
}

async function loadUsers(){

let r=await fetch("/users")
let data=await r.json()

users.innerHTML=""

data.forEach(u=>{

if(u.id===currentUser.id) return

let div=document.createElement("div")
div.className="user"
div.innerText=u.username

users.appendChild(div)

})

}

function send(){

let text=msg.value

socket.emit("message",{
user:currentUser.username,
text:text
})

msg.value=""
}

socket.on("message",m=>{

let div=document.createElement("div")
div.innerText=m.user+": "+m.text

messages.appendChild(div)

})

</script>

</body>
</html>
