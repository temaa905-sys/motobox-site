<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Тест синхронизации</title>
</head>

<body style="font-family:Arial;text-align:center;margin-top:120px;">

<h1>Тест синхронизации сайта</h1>

<h2 id="status">Загрузка...</h2>

<script>

let state={}

async function loadState(){

try{

let r=await fetch("state.json?"+Date.now())
state=await r.json()

document.getElementById("status").innerText=state.mode

}catch(e){

document.getElementById("status").innerText="Ошибка загрузки"

}

}

setInterval(loadState,1000)

</script>

</body>
</html>
