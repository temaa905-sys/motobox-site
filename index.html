<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <title>Проверка синхронизации</title>
</head>
<body style="font-family:Arial;text-align:center;margin-top:120px;">

  <h1>Проверка синхронизации</h1>
  <h2 id="status">Загрузка...</h2>
  <p id="debug">...</p>

  <script>
    async function loadState() {
      try {
        const response = await fetch("./state.json?t=" + Date.now(), {
          cache: "no-store"
        });

        document.getElementById("debug").innerText =
          "HTTP: " + response.status + " | URL: " + response.url;

        if (!response.ok) {
          document.getElementById("status").innerText = "Ошибка HTTP " + response.status;
          return;
        }

        const state = await response.json();

        document.getElementById("status").innerText = state.mode || "Нет mode";
      } catch (e) {
        document.getElementById("status").innerText = "Ошибка загрузки";
        document.getElementById("debug").innerText = String(e);
      }
    }

    loadState();
    setInterval(loadState, 1000);
  </script>

</body>
</html>
